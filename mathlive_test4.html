<!DOCTYPE html>
<html>
<head>
    <script defer src="https://unpkg.com/mathlive"></script>
</head>
<body>
    <h2>Enclose longdiv</h2>
    <math-field>\enclose{longdiv}{345678}</math-field>

    <h2>Enclose longdiv with overset</h2>
    <math-field>\overset{12}{\enclose{longdiv}{345678}}</math-field>
    
    <h2>Enclose longdiv with overset (long quotient)</h2>
    <math-field>\overset{123456789}{\enclose{longdiv}{34}}</math-field>

    <h2>Enclose longdiv with overset and divisor</h2>
    <math-field>12 \overset{34}{\enclose{longdiv}{5678}}</math-field>
</body>
</html>
